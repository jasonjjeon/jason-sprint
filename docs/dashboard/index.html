<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케팅 대시보드</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --blue: #3b82f6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text);
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .container { max-width: 600px; width: 100%; padding: 40px 24px; text-align: center; }
  h1 { font-size: 1.8rem; margin-bottom: 8px; }
  .caption { color: var(--muted); font-size: 0.85rem; margin-bottom: 2.5rem; }
  .card-grid { display: flex; flex-direction: column; gap: 16px; }
  a.card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
           padding: 24px; text-decoration: none; color: var(--text); transition: all 0.2s; }
  a.card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(59,130,246,0.15); }
  .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
  .card-desc { color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
  <h1>마케팅 대시보드</h1>
  <p class="caption">W1 (3/23~3/29) vs W2 (3/30~4/5)</p>
  <div class="card-grid">
    <a class="card" href="appgrowth.html">
      <div class="card-title">앱그로스 주간 성과 분석</div>
      <div class="card-desc">Google · Facebook 캠페인 비교, 소재별 성과, 채널 비교</div>
    </a>
    <a class="card" href="https://jasonjjeon.github.io/pbtd-kakao-report/">
      <div class="card-title">카카오 주간 마케팅 분석</div>
      <div class="card-desc">카카오 캠페인별 성과, W1 vs W2 비교, 인사이트</div>
    </a>
    <a class="card" href="kakao-roas.html">
      <div class="card-title">카카오 광고그룹 ROAS</div>
      <div class="card-desc">카카오 광고그룹별 ROAS 상세 분석 (1일/7일/30일)</div>
    </a>
    <a class="card" href="ua-strategy.html">
      <div class="card-title">UA 확장 전략</div>
      <div class="card-desc">카카오 · 메타 · 구글 UA 확장 전략, 갭 분석, 액션 플랜</div>
    </a>
  </div>
</div>
</body>
</html>
